<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h2>🏛 E-Matdaan</h2>
            <p>Admin Control</p>
        </div>

        <nav class="menu">

            <a class="active" href="/admin_dashboard">
                <i class="fa fa-chart-line"></i>
                Dashboard
            </a>

            <a href="/admin/notices">
                <i class="fa fa-bullhorn"></i>
                Notices
            </a>

            <a href="/admin/states">
                <i class="fa fa-map"></i>
                States
            </a>

            <a href="/admin/elections">
                <i class="fa fa-vote-yea"></i>
                Elections
            </a>

            <a href="/admin/analytics">
                <i class="fa fa-chart-pie"></i>
                Analytics
            </a>

            <a href="/logout">
                <i class="fa fa-sign-out"></i>
                Logout
            </a>

        </nav>

    </aside>


    <!-- MAIN -->
    <main class="main">

        <div class="topbar">

            <div>
                <h1>Election Command Center</h1>
                <p>National Monitoring Dashboard</p>
            </div>

            <div class="avatar">A</div>

        </div>


        <!-- CARDS -->
        <section class="cards">

            <div class="card">
                <p>Total Voters</p>
                <h2>{{ voters }}</h2>
            </div>

            <div class="card">
                <p>Active Elections</p>
                <h2>{{ active_elections }}</h2>
            </div>

            <div class="card">
                <p>Inactive States</p>
                <h2>{{ inactive_states }}</h2>
            </div>

            <div class="card">
                <p>System Status</p>
                <h2>100%</h2>
            </div>

        </section>


        <!-- QUICK ACTIONS -->
        <section class="panel">

            <div class="panel-head">
                <h2>Quick Actions</h2>
            </div>

            <a href="/admin/notices">
                <button>Manage Notices</button>
            </a>

            <a href="/admin/elections">
                <button>Create Election</button>
            </a>

        </section>

    </main>

</div>

</body>
</html>
