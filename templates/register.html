<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Matdaan | Registration</title>

<link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/logo.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
</head>
<body>

<!-- Header -->
<header class="topbar">
    <div class="logo-area">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo">
        <h1>E-Matdaan Portal</h1>
    </div>

    <nav>
        <a href="/home">Home</a>
        <a href="/result">Result</a>
        <a href="javascript:void(0)" onclick="openContact()">Contact Us</a>
    </nav>
</header>

<!-- Animated Background -->
<div class="bg-circle one"></div>
<div class="bg-circle two"></div>
<div class="bg-circle three"></div>

<!-- Main -->
<section class="main-section">

    <div class="register-card">

        <h2>Voter Registration</h2>
        <p>Create your secure digital voting account</p>

        <form action="/register" method="POST">

            <input type="text" name="name" placeholder="Full Name" required>
            
            <input list="states" name="state_code" placeholder="State Code" required>
            <datalist id="states">
            <option value="Andhra Pradesh">
            <option value="Arunachal Pradesh">
            <option value="Assam">
            <option value="Bihar">
            <option value="Chhattisgarh">
            <option value="Goa">
            <option value="Gujarat">
            <option value="Haryana">
            <option value="Himachal Pradesh">
            <option value="Jharkhand">
            <option value="Karnataka">
            <option value="Kerala">
            <option value="Madhya Pradesh">
            <option value="Maharashtra">
            <option value="Manipur">
            <option value="Meghalaya">
            <option value="Mizoram">
            <option value="Nagaland">
            <option value="Odisha">
            <option value="Punjab">
            <option value="Rajasthan">
            <option value="Sikkim">
            <option value="Tamil Nadu">
            <option value="Telangana">
            <option value="Tripura">
            <option value="Uttar Pradesh">
            <option value="Uttarakhand">
            <option value="West Bengal">

            <!-- Union Territories -->
            <option value="Andaman and Nicobar Islands">
            <option value="Chandigarh">
            <option value="Dadra and Nagar Haveli and Daman and Diu">
            <option value="Delhi">
            <option value="Jammu and Kashmir">
            <option value="Ladakh">
            <option value="Lakshadweep">
            <option value="Puducherry">
        </datalist>

            <input type="text" name="constituency" placeholder="Constituency" required>

            <input type="text" name="phone" placeholder="Mobile Number" required>

            <input type="text" name="epic" placeholder="EPIC Number" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Register Now</button>

            <a href="/login" class="login-link">
                Already Registered? Login
            </a>

        </form>

    </div>

</section>

<!-- Footer -->
<footer>
    © 2026 E-Matdaan Portal | Secure Online Voting
</footer>
<div id="contactModal" class="contact-modal">
    <div class="contact-box">
        <span class="close-btn" onclick="closeContact()">&times;</span>

        <h2>Contact Us</h2>

        <p><strong>Helpline:</strong> +91 638433409</p>
        <p><strong>Email:</strong> support@ematdaan.gov.in</p>
        <p><strong>Office:</strong> Election Commission Help Desk</p>
    </div>
</div>

<script>
function openContact(){
    document.getElementById("contactModal").style.display = "flex";
}

function closeContact(){
    document.getElementById("contactModal").style.display = "none";
}

window.onclick = function(e){
    let modal = document.getElementById("contactModal");
    if(e.target == modal){
        modal.style.display = "none";
    }
}
</script>
</body>
</html>
